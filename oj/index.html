<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GOC Online Judge</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<!-- GOC-162: right-click context menu -->
<div class="ctx-menu hidden" id="ctx-menu"></div>

<header>
  <h1>GOC Online Judge</h1>
  <span class="subtitle">图形编程在线练习系统</span>
  <div class="header-stats">
    <span>已解</span>
    <span class="stat-val" id="header-solved">0</span>
    <span>/</span>
    <span class="stat-val" id="header-total">0</span>
    <span>题</span>
  </div>
  <button class="dark-toggle-btn" id="dark-toggle-btn" title="切换深色/浅色模式">🌙 深色</button>
  <button class="dark-toggle-btn" id="btn-backup"  title="导出所有练习记录为 JSON 文件">💾 备份</button>
  <button class="dark-toggle-btn" id="btn-restore" title="从 JSON 文件恢复练习记录">📂 恢复</button>
  <input type="file" id="restore-file-input" accept=".json" style="display:none">
</header>

<div class="main">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">题目列表 <span id="prob-count" style="color:#888;font-weight:normal;font-size:11px"></span></div>
    <div class="progress-bar-wrap" id="progress-wrap">
      <div class="progress-bar-row"><span>练习进度</span><strong id="progress-label">0 / 0 通过</strong><button id="btn-clear-progress" title="清空所有进度" style="margin-left:6px;padding:1px 6px;font-size:9px;border:1px solid #ccc;background:#fff;border-radius:4px;cursor:pointer;color:#999">重置</button></div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>
    </div>
    <!-- GOC-108: progress ring -->
    <div class="progress-ring-wrap" id="progress-ring-wrap">
      <svg class="progress-ring-svg" viewBox="0 0 36 36">
        <circle class="progress-ring-bg" cx="18" cy="18" r="16"/>
        <circle class="progress-ring-fill" id="progress-ring-fill" cx="18" cy="18" r="16"/>
      </svg>
      <div><div class="progress-ring-label" id="progress-ring-pct">0%</div><div class="progress-ring-sub">完成率</div></div>
      <!-- GOC-167: today's stats -->
      <div id="today-stats" style="margin-left:auto;text-align:right;font-size:10px;color:#aaa;line-height:1.5"></div>
    </div>
    <div class="search-box">
      <input type="text" id="search-input" placeholder="搜索题目… 或 #编号跳转" autocomplete="off">
      <button class="search-clear-btn" id="search-clear-btn" title="清除搜索">✕</button>
    </div>
    <div class="filter-summary" id="filter-summary"></div>
    <div class="status-filter" id="status-filter">
      <button class="status-btn active" data-status="all">全部</button>
      <button class="status-btn" data-status="todo">未做</button>
      <button class="status-btn" data-status="pass">已通过</button>
      <button class="status-btn" data-status="fail">未通过</button>
      <button class="status-btn" data-status="star">⭐ 收藏</button>
    </div>
    <div class="filter-bar" id="filter-bar">
      <button class="filter-btn active" data-filter="all">全部</button>
      <button class="filter-btn" data-filter="easy">入门</button>
      <button class="filter-btn" data-filter="medium">进阶</button>
      <button class="filter-btn" data-filter="hard">高级</button>
    </div>
    <div class="filter-toggle" id="filter-toggle">
      <span class="filter-toggle-label">标签 / 数学章节</span>
      <span class="filter-toggle-icon">▼</span>
    </div>
    <div class="filter-collapsible" id="filter-collapsible">
      <div class="tag-filter" id="tag-filter"></div>
      <div class="curriculum-filter" id="curriculum-filter">
        <span class="curriculum-label">数学章节：</span>
      </div>
    </div>
    <div class="problem-list" id="problem-list"></div>
    <div class="sidebar-footer">
      <button class="btn-random" id="btn-random">🎲 随机一题</button>
    </div>
  </aside>
  <button class="sidebar-collapse-btn" id="sidebar-collapse-btn" title="折叠侧边栏">‹</button>

  <!-- Content -->
  <div class="content" id="content">
    <div class="welcome" id="welcome">
      <div style="font-size:48px">🎨</div>
      <h2>选择一道题目开始练习</h2>
      <p style="font-size:13px">从左侧选择题目，编写 GOC 代码，运行查看图形，提交验证答案。</p>
      <div class="welcome-stats" id="welcome-stats">
        <div class="welcome-stat"><div class="ws-val" id="ws-total">—</div><div class="ws-lbl">道题目</div></div>
        <div class="welcome-stat"><div class="ws-val" id="ws-solved">—</div><div class="ws-lbl">已通过</div></div>
        <div class="welcome-stat"><div class="ws-val" id="ws-pct">—</div><div class="ws-lbl">完成率</div></div>
      </div>
      <div class="welcome-actions" id="welcome-actions">
        <button class="welcome-action-btn" id="ws-btn-random">🎲 随机一题</button>
        <button class="welcome-action-btn" id="ws-btn-continue">▶ 继续上次</button>
      </div>
    </div>
  </div>
</div>

<!-- GOC-048: Toast notification -->
<div class="goc-toast" id="goc-toast"></div>
<!-- Autocomplete dropdown (GOC-015) -->
<div class="autocomplete" id="autocomplete"></div>
<!-- GOC-175: color picker popup for pen.c() -->
<div class="color-picker-popup" id="color-picker-popup"></div>
<!-- GOC-176: param hint popup for pen.method() -->
<div class="param-hint-popup" id="param-hint-popup">
  <div class="param-hint-sig" id="param-hint-sig"></div>
  <div class="param-hint-desc" id="param-hint-desc"></div>
</div>

<!-- Problem view template -->
<template id="tpl-problem-view">
  <!-- Problem panel -->
  <div class="prob-panel" id="prob-panel">
    <div class="prob-passed-banner" id="prob-passed-banner">✅ 已通过！继续保持！</div>
    <div class="prob-panel-header">
      <div style="display:flex;align-items:center">
        <h2 id="p-title" style="flex:1"></h2>
        <button class="prob-desc-toggle" id="prob-desc-toggle" title="折叠/展开题目描述">▲</button>
      </div>
      <div class="meta" id="p-meta"></div>
      <div class="prob-nav">
        <span class="prob-timer" id="prob-timer">0:00</span>
        <button class="prob-nav-btn" id="btn-copy-desc" title="复制题目描述" style="font-size:11px">📋</button>
        <button class="prob-nav-btn" id="btn-prev" title="上一题">‹</button>
        <span class="prob-nav-counter" id="prob-nav-counter"></span>
        <button class="prob-nav-btn" id="btn-next" title="下一题">›</button>
      </div>
    </div>
    <div class="prob-desc" id="p-desc"></div>
    <div class="note-section" id="note-section">
      <button class="note-toggle-btn" id="note-toggle-btn">✏️ 我的笔记</button>
      <div class="note-content" id="note-content" style="display:none">
        <textarea id="note-textarea" maxlength="200" placeholder="写下解题思路或难点…（最多200字）"></textarea>
        <span class="note-save-status" id="note-save-status"></span>
      </div>
    </div>
    <!-- GOC-170: layered hints section -->
    <div class="hint-section" id="hint-section" style="display:none">
      <div class="hint-items" id="hint-items"></div>
      <button class="hint-next-btn" id="hint-next-btn">💡 提示</button>
    </div>
    <div class="sol-reveal-section" id="sol-reveal-section" style="display:none">
      <button class="sol-reveal-btn" id="sol-reveal-btn">💡 参考解法 ▼</button>
      <div class="sol-reveal-content" id="sol-reveal-content" style="display:none"></div>
    </div>
    <!-- GOC-165: related problems -->
    <div class="related-section" id="related-section" style="display:none">
      <div class="related-label">📌 相关题目</div>
      <div class="related-problems" id="related-problems"></div>
    </div>
    <div class="prob-resizer" id="prob-resizer"></div>
    <div class="sol-preview" id="sol-preview">
      <div class="sol-preview-header">
        <span>目标图形</span>
        <span style="color:#aaa;font-weight:normal">（参考效果）</span>
        <button class="sol-toggle-btn" id="sol-toggle-btn">收起</button>
      </div>
      <div class="sol-canvas-wrap" id="sol-canvas-wrap">
        <canvas id="sol-canvas"></canvas>
      </div>
    </div>
  </div>

  <!-- Editor panel -->
  <div class="editor-panel">
    <div class="editor-toolbar">
      <span class="label">代码编辑器</span>
      <span id="editor-line-count" style="font-size:10px;color:#aaa;margin-left:4px"></span>
      <div class="jump-line-wrap" title="跳转到行">
        <span style="font-size:10px;color:#aaa">⌨</span>
        <input class="jump-line-input" id="jump-line-input" type="number" min="1" placeholder="行">
      </div>
      <div class="speed-group" id="speed-group">
        <button class="speed-btn" data-speed="0.5">慢</button>
        <button class="speed-btn active" data-speed="1">正常</button>
        <button class="speed-btn" data-speed="2">快</button>
        <button class="speed-btn" data-speed="999">极速</button>
      </div>
      <button class="btn btn-ref"      id="btn-ref">📖 指令</button>
      <button class="btn btn-snip"     id="btn-snip">📄 模板</button>
      <button class="btn btn-format"   id="btn-format">⇥ 格式化</button>
      <button class="btn btn-reset"    id="btn-copy" title="复制代码到剪贴板">📋 复制</button>
      <div class="font-size-group">
        <button class="font-size-btn" id="btn-font-dec" title="缩小字体">A-</button>
        <span class="font-size-label" id="font-size-label">14px</span>
        <button class="font-size-btn" id="btn-font-inc" title="放大字体">A+</button>
      </div>
      <select class="font-family-select" id="font-family-select" title="字体">
        <option value="'Menlo','Consolas','Courier New',monospace">Menlo</option>
        <option value="'Consolas','Courier New',monospace">Consolas</option>
        <option value="'Courier New',monospace">Courier New</option>
        <option value="'JetBrains Mono','Fira Code',monospace">JetBrains</option>
      </select>
      <span class="autosave-badge" id="autosave-badge"></span>
      <div class="toolbar-sep"></div>
      <button class="btn btn-hint"     id="btn-hint">💡 提示</button>
      <button class="btn btn-reset"    id="btn-reset">重置</button>
      <div class="toolbar-sep"></div>
      <button class="btn btn-step"     id="btn-step">⏩ 单步</button>
      <button class="btn btn-continue" id="btn-continue">▶ 继续</button>
      <button class="btn btn-run"      id="btn-run">▶ 运行</button>
      <div class="toolbar-sep"></div>
      <button class="btn btn-submit"   id="btn-submit">✔ 提交</button>
      <button class="btn-shortcut" id="btn-shortcut" title="键盘快捷键">?</button>
    </div>
    <div class="shortcut-popup" id="shortcut-popup">
      <h4>⌨️ 键盘快捷键</h4>
      <div class="shortcut-row"><span class="shortcut-key">Ctrl+Enter</span><span class="shortcut-desc">运行代码</span></div>
      <div class="shortcut-row"><span class="shortcut-key">Ctrl+Shift+Enter</span><span class="shortcut-desc">提交答案</span></div>
      <div class="shortcut-row"><span class="shortcut-key">Tab</span><span class="shortcut-desc">缩进（4空格）</span></div>
      <div class="shortcut-row"><span class="shortcut-key">Shift+Tab</span><span class="shortcut-desc">减少缩进</span></div>
      <div class="shortcut-row"><span class="shortcut-key">Ctrl+Z</span><span class="shortcut-desc">撤销</span></div>
      <div class="shortcut-row"><span class="shortcut-key">Ctrl+/</span><span class="shortcut-desc">注释/取消注释</span></div>
      <div class="shortcut-row"><span class="shortcut-key">↑ / ↓</span><span class="shortcut-desc">切换题目（焦点不在编辑器时）</span></div>
      <div class="shortcut-row"><span class="shortcut-key">Ctrl+B</span><span class="shortcut-desc">折叠/展开侧边栏（焦点不在编辑器时）</span></div>
      <div class="shortcut-row"><span class="shortcut-key">Ctrl+F</span><span class="shortcut-desc">编辑器内搜索</span></div>
      <div class="shortcut-row"><span class="shortcut-key">Enter</span><span class="shortcut-desc">自动继承上一行缩进</span></div>
      <div class="shortcut-row"><span class="shortcut-key">Ctrl+Space</span><span class="shortcut-desc">触发自动补全</span></div>
    </div>
    <div class="ref-panel hidden" id="ref-panel"></div>
    <div class="snip-panel hidden" id="snip-panel"></div>
    <div class="editor-area">
      <div class="editor-wrapper" id="editor-wrapper">
        <div class="line-numbers" id="line-numbers" aria-hidden="true">1</div>
        <div class="editor-code-area">
          <pre class="highlight-layer" id="highlight-layer" aria-hidden="true"></pre>
          <textarea id="code-editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
        </div>
      </div>
      <!-- GOC-166: in-editor search bar -->
      <div class="editor-search-bar hidden" id="editor-search-bar">
        <input class="editor-search-input" id="editor-search-input" placeholder="搜索代码…" autocomplete="off" spellcheck="false">
        <span class="editor-search-count" id="editor-search-count"></span>
        <button class="editor-search-nav" id="editor-search-prev" title="上一个（Shift+Enter）">↑</button>
        <button class="editor-search-nav" id="editor-search-next" title="下一个（Enter）">↓</button>
        <button class="editor-search-close" id="editor-search-close" title="关闭（Escape）">✕</button>
      </div>
    </div>
    <!-- cin/cout panel (GOC-008) -->
    <div class="io-panel" id="io-panel">
      <div class="io-panel-header">
        ⌨️ 输入 / 输出
        <button id="io-clear-btn" style="margin-left:auto">清空</button>
      </div>
      <div class="io-rows">
        <div class="io-col">
          <div class="io-col-label">标准输入 (cin) — 每行一个值</div>
          <textarea class="io-input" id="io-input" placeholder="在此输入数据…"></textarea>
        </div>
        <div class="io-col">
          <div class="io-col-label">标准输出 (cout)</div>
          <div class="io-output" id="io-output"></div>
        </div>
      </div>
    </div>
    <div class="canvas-resizer" id="canvas-resizer"></div>
    <div class="canvas-section" id="canvas-section">
      <div class="canvas-toolbar">
        <span>画布输出</span>
        <span id="canvas-size-label" style="font-size:10px;color:#aaa;margin-left:4px">440×240</span>
        <span style="flex:1"></span>
        <!-- GOC-168: grid checkbox -->
        <label style="font-size:10px;color:#888;cursor:pointer;display:flex;align-items:center;gap:4px">
          <input type="checkbox" id="grid-cb" style="margin:0"> 网格
        </label>
        <!-- GOC-171: ruler checkbox -->
        <label style="font-size:10px;color:#888;cursor:pointer;display:flex;align-items:center;gap:4px">
          <input type="checkbox" id="ruler-cb" style="margin:0"> 标尺
        </label>
        <!-- GOC-174: compare reference (visible only after submit fail) -->
        <label id="compare-label" style="font-size:10px;color:#e67c00;cursor:pointer;display:none;align-items:center;gap:4px">
          <input type="checkbox" id="compare-cb" style="margin:0"> 对比参考
        </label>
        <label style="font-size:10px;color:#888;cursor:pointer;display:flex;align-items:center;gap:4px">
          <input type="checkbox" id="fit-mode-cb" checked style="margin:0"> 自适应居中
        </label>
        <button class="btn btn-reset" id="btn-save-canvas" style="padding:2px 8px;font-size:10px" title="下载画布为PNG">💾 截图</button>
        <button class="btn btn-reset" id="btn-clear" style="padding:2px 8px;font-size:10px">清空</button>
      </div>
      <div class="canvas-wrap" id="canvas-wrap">
        <div style="position:relative;display:inline-flex">
          <canvas id="goc-canvas" width="440" height="240"></canvas>
          <!-- GOC-168: grid overlay canvas -->
          <canvas id="grid-canvas" width="440" height="240" style="position:absolute;top:0;left:0;pointer-events:none;display:none"></canvas>
          <!-- GOC-172: turtle direction indicator overlay -->
          <canvas id="turtle-canvas" width="440" height="240" style="position:absolute;top:0;left:0;pointer-events:none;display:none"></canvas>
          <!-- GOC-171: ruler overlay canvas -->
          <canvas id="ruler-canvas" width="440" height="240" style="position:absolute;top:0;left:0;pointer-events:none;display:none"></canvas>
          <!-- GOC-173: crosshair overlay canvas -->
          <canvas id="crosshair-canvas" width="440" height="240" style="position:absolute;top:0;left:0;pointer-events:none"></canvas>
          <!-- GOC-174: compare overlay canvas -->
          <canvas id="compare-canvas" width="440" height="240" style="position:absolute;top:0;left:0;pointer-events:none;display:none"></canvas>
        </div>
        <div class="canvas-coord" id="canvas-coord"></div>
      </div>
    </div>
    <!-- Step controls (GOC-001) -->
    <div class="step-controls" id="step-controls">
      <span>单步模式</span>
      <span class="step-pos" id="step-pos">0 / 0</span>
      <div class="step-progress-bar"><div class="step-progress-fill" id="step-progress-fill" style="width:0%"></div></div>
      <button class="btn btn-step" id="btn-step2" style="padding:3px 8px;font-size:11px">下一步</button>
      <button class="btn btn-run"  id="btn-step-auto" style="padding:3px 8px;font-size:11px">连续播放</button>
      <button class="btn btn-reset" id="btn-step-exit" style="padding:3px 8px;font-size:11px">退出单步</button>
    </div>
    <div class="result-bar idle" id="result-bar">准备就绪 — 点击「运行」查看图形，点击「提交」验证答案。</div>
  </div>
</template>

<script src="data/problems.js"></script>
<script src="js/goc-executor.js"></script>
<script src="js/constants.js"></script>
<script src="js/state.js"></script>
<script src="js/storage.js"></script>
<script src="js/utils.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/problem.js"></script>
<script src="js/highlight.js"></script>
<script src="js/autocomplete.js"></script>
<script src="js/editor.js"></script>
<script src="js/step.js"></script>
<script src="js/runner.js"></script>
<script src="js/canvas.js"></script>
<script src="js/init.js"></script>
</body>
</html>
