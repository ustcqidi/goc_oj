  // ── Image Judge (GOC-038) ──────────────────────────────────────────
  const IMAGE_JUDGE_OPTIONS = { canvasW: 400, canvasH: 400, pixelTolRatio: 0.02, colorTol: 20 };

  function createOffscreenCtx(w, h) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    return c.getContext('2d');
  }

  // Compare two renders using the reference trajectory's fitTransform for both.
  // Tolerance is measured over drawn pixels only (alpha > 0), not the full canvas,
  // so thin colored lines are not diluted by the large transparent background.
  function judgeByImage(userTraj, refTraj, opts) {
    const o = Object.assign({}, IMAGE_JUDGE_OPTIONS, opts);
    const refTransform = GOCRenderer.computeFitTransform(refTraj, o.canvasW, o.canvasH, 20);
    const refCtx  = createOffscreenCtx(o.canvasW, o.canvasH);
    const userCtx = createOffscreenCtx(o.canvasW, o.canvasH);
    GOCRenderer.renderWithTransform(refCtx,  refTraj,  o.canvasW, o.canvasH, refTransform);
    GOCRenderer.renderWithTransform(userCtx, userTraj, o.canvasW, o.canvasH, refTransform);
    const refData  = refCtx.getImageData(0, 0, o.canvasW, o.canvasH).data;
    const userData = userCtx.getImageData(0, 0, o.canvasW, o.canvasH).data;
    // Count only pixels where at least one image has visible content (alpha > 10).
    // Grid lines and GOC lines both have alpha > 0; purely empty areas have alpha = 0.
    // This keeps the denominator proportional to the drawn area, so wrong-color thin
    // lines cannot be hidden by the large transparent background.
    let drawn = 0, diff = 0;
    for (let i = 0; i < refData.length; i += 4) {
      if (refData[i + 3] < 10 && userData[i + 3] < 10) continue; // both empty
      drawn++;
      if (Math.abs(refData[i]   - userData[i])   > o.colorTol ||
          Math.abs(refData[i+1] - userData[i+1]) > o.colorTol ||
          Math.abs(refData[i+2] - userData[i+2]) > o.colorTol) {
        diff++;
      }
    }
    const base = drawn > 0 ? drawn : o.canvasW * o.canvasH;
    return { pass: diff / base < o.pixelTolRatio, diffRatio: +(diff / base).toFixed(4) };
  }

  // Try primary expected + acceptedTrajectories, return first pass or the primary fail reason.
  function judgeMulti(userTraj, problem, primaryExpected) {
    const allExpected = [primaryExpected, ...(problem.acceptedTrajectories || [])];
    for (const exp of allExpected) {
      const v = GOCJudge.judge(userTraj, exp);
      if (v.pass) return v;
    }
    return GOCJudge.judge(userTraj, primaryExpected);
  }

  // ── Submit ─────────────────────────────────────────────────────────
  function submitCode() {
    if (!currentProblem) return;
    const code = document.getElementById('code-editor').value;
    setResult('running', '判题中…');
    cancelAnimation();

    setTimeout(() => {
      try {
        ensureExpected(currentProblem);
        const userResult = GOCExecutor.run(code, { inputLines: getInputLines(), stepLimit: 5000 });

        if (userResult.output && userResult.output.length > 0) {
          document.getElementById('io-panel')?.classList.add('visible');
          showOutput(userResult.output);
        }

        if (!userResult.ok) {
          highlightErrorLine(userResult.line);
          setResult('error', (userResult.line ? `❌ 第${userResult.line}行：` : '❌ 运行错误：') + userResult.error.replace(/^第 \d+ 行：/, ''));
          saveRecord(currentProblem.id, code, 'fail');
          renderSidebar(currentFilter, currentTag, currentCurriculum);
          return;
        }

        const canvas = document.getElementById('goc-canvas');
        const ctx = canvas.getContext('2d');
        const fitMode = document.getElementById('fit-mode-cb')?.checked;
        GOCRenderer.render(ctx, userResult.trajectory, canvas.width, canvas.height, fitMode);

        const expected = expectedTrajCache[currentProblem.id];
        if (expected === undefined) { setResult('error', '⚠️ 参考答案执行失败，无法判题。'); return; }

        // Graphic problems default to image_fallback; computation problems use output comparison.
        const isGraphicProblem = expected.length > 0;
        const judgeMode = currentProblem.judgeMode || (isGraphicProblem ? 'image_fallback' : 'output');
        let verdict;

        if (judgeMode === 'image') {
          // 纯图像判题
          const img = judgeByImage(userResult.trajectory, expected, IMAGE_JUDGE_OPTIONS);
          verdict = img.pass
            ? { pass: true,  reason: '图形正确！' }
            : { pass: false, reason: '图形不匹配，请检查你的代码。' };
        } else if (judgeMode === 'image_fallback') {
          // 分层：轨迹优先，图像兜底
          verdict = judgeMulti(userResult.trajectory, currentProblem, expected);
          if (!verdict.pass) {
            const img = judgeByImage(userResult.trajectory, expected, IMAGE_JUDGE_OPTIONS);
            if (img.pass) {
              verdict = { pass: true, reason: '图形正确！你的写法与参考答案不同，但画出的图形一样。' };
            }
          }
        } else if (judgeMode === 'output') {
          // 非图形题：比较 cout 输出
          const inputLines = getInputLines();
          const solResult = GOCExecutor.run(currentProblem.solution || '', { inputLines, stepLimit: 5000 });
          const expectedOut = (solResult.ok ? solResult.output || [] : expectedTrajCache[currentProblem.id + '__output'] || []).map(s => s.trim()).join('\n');
          const userOut = (userResult.output || []).map(s => s.trim()).join('\n');
          if (!expectedOut && !userOut) {
            verdict = { pass: true, reason: '通过！' };
          } else if (userOut === expectedOut) {
            verdict = { pass: true, reason: '输出正确！' };
          } else {
            verdict = { pass: false, reason: `输出不匹配。\n期望：${expectedOut || '(空)'}\n实际：${userOut || '(空)'}` };
          }
        } else {
          // 'trajectory'（默认）：多组轨迹比对
          verdict = judgeMulti(userResult.trajectory, currentProblem, expected);
        }

        if (verdict.pass) {
          setResult('pass', '✅ 通过！' + verdict.reason);
          saveRecord(currentProblem.id, code, 'pass');
          // GOC-153: save best time on pass
          saveBestTime(currentProblem.id, Math.floor((Date.now() - _timerStart) / 1000));
          // GOC-157: reveal solution section on pass

          // GOC-075: show passed banner

  // ── Utils ──────────────────────────────────────────────────────────
  function escapeHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderMarkdown(md) {
    if (!md) return '';
    let html = escapeHtml(md);
    html = html.replace(/```([\s\S]*?)```/g, (_, c) => `<pre>${c.trim()}</pre>`);
    html = html.replace(/`([^`]+)`/g, (_, c) => `<code>${c}</code>`);
    html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
    html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
    html = html.replace(/(<li>[\s\S]*?<\/li>)/g, m => `<ul>${m}</ul>`);
    html = html.replace(/<\/ul>\n?<ul>/g, '');
    html = html.replace(/\n\n+/g, '</p><p>');
    html = html.replace(/\n/g, '<br>');
    return '<p>' + html + '</p>';
  }

    function drawRuler() {
      const rc = document.getElementById('ruler-canvas');
      const cb = document.getElementById('ruler-cb');
      if (!rc) return;
      const show = cb?.checked;
      rc.style.display = show ? '' : 'none';
      if (!show) return;
      const W = rc.width, H = rc.height, cx = W / 2, cy = H / 2, step = 40;
      const ctx = rc.getContext('2d');
      ctx.clearRect(0, 0, W, H);
      const dark = document.body.classList.contains('dark-mode');
      const fg = dark ? 'rgba(200,215,255,0.65)' : 'rgba(50,55,80,0.55)';
      const bg = dark ? 'rgba(20,22,28,0.62)'    : 'rgba(248,248,255,0.68)';
      ctx.font = '8px monospace';
      ctx.lineWidth = 1;
      ctx.strokeStyle = fg;
      // X ruler (top edge)
      ctx.textAlign = 'center';
      for (let gx = -Math.floor(cx / step) * step; gx <= cx; gx += step) {
        const px = cx + gx;
        if (px < 2 || px > W - 2) continue;
        ctx.beginPath(); ctx.moveTo(px + 0.5, 0); ctx.lineTo(px + 0.5, 5); ctx.stroke();
        const label = String(gx);
        const tw = ctx.measureText(label).width;
        ctx.fillStyle = bg;
        ctx.fillRect(Math.round(px - tw / 2) - 1, 5, Math.ceil(tw) + 2, 9);
        ctx.fillStyle = fg;
        ctx.fillText(label, px, 13);
      }
      // Y ruler (left edge)
      ctx.textAlign = 'left';
      for (let gy = -Math.floor((H - cy) / step) * step; gy <= cy; gy += step) {
        const py = cy - gy;
        if (py < 2 || py > H - 2) continue;
        ctx.beginPath(); ctx.moveTo(0, py + 0.5); ctx.lineTo(5, py + 0.5); ctx.stroke();
        const label = String(gy);
        const tw = ctx.measureText(label).width;
        ctx.fillStyle = bg;
        ctx.fillRect(5, Math.round(py - 4), Math.ceil(tw) + 2, 9);
        ctx.fillStyle = fg;
        ctx.fillText(label, 5, py + 3);
      }
    }

    document.addEventListener('click', e => {
      if (e.target.id === 'btn-copy-desc' && currentProblem) {
        const text = `#${currentProblem.id} ${currentProblem.title}\n\n${currentProblem.description || ''}`;
        const btn = e.target;
        const copy = () => { btn.textContent = '✅'; setTimeout(() => { btn.textContent = '📋'; }, 1500); };
        if (navigator.clipboard?.writeText) navigator.clipboard.writeText(text).then(copy).catch(() => {});
      }
    });

    // GOC-106: Sidebar collapse toggle
    (function initSidebarCollapse() {
      const sidebar = document.getElementById('sidebar');
      const btn = document.getElementById('sidebar-collapse-btn');
      if (!sidebar || !btn) return;
      const collapsed = localStorage.getItem('goc_sidebar_collapsed') === '1';
      if (collapsed) { sidebar.classList.add('collapsed'); btn.textContent = '›'; btn.title = '展开侧边栏'; }
      btn.addEventListener('click', () => {
        const isNow = sidebar.classList.toggle('collapsed');
        btn.textContent = isNow ? '›' : '‹';
        btn.title = isNow ? '展开侧边栏' : '折叠侧边栏';
        localStorage.setItem('goc_sidebar_collapsed', isNow ? '1' : '0');
      });
    })();

    // GOC-156: Ctrl+B toggle sidebar (when focus not in editor/input)
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
      if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
        e.preventDefault();
        document.getElementById('sidebar-collapse-btn')?.click();
      }
    });

    // GOC-162: right-click context menu on problem list items
    (function initCtxMenu() {
      const menu = document.getElementById('ctx-menu');
      if (!menu) return;
      let _ctxProblem = null;

      function closeCtxMenu() { menu.classList.add('hidden'); menu.innerHTML = ''; _ctxProblem = null; }

      function openCtxMenu(x, y, p) {
        _ctxProblem = p;
        const starred = isStar(p.id);
        const rec = loadRecord(p.id);
        const hasProgress = !!(rec);
        menu.innerHTML =
          `<button class="ctx-menu-item" id="_ctx-star">${starred ? '☆ 取消收藏' : '★ 收藏题目'}</button>` +
          `<button class="ctx-menu-item" id="_ctx-copy">📋 复制题号 #${p.id}</button>` +
          (hasProgress ? `<div class="ctx-menu-sep"></div><button class="ctx-menu-item danger" id="_ctx-reset">↺ 重置本题进度</button>` : '');
        // Position
        menu.classList.remove('hidden');
        const mw = menu.offsetWidth, mh = menu.offsetHeight;
        const vw = window.innerWidth, vh = window.innerHeight;
        menu.style.left = (x + mw > vw ? vw - mw - 4 : x) + 'px';
        menu.style.top  = (y + mh > vh ? vh - mh - 4 : y) + 'px';

        menu.querySelector('#_ctx-star')?.addEventListener('click', () => {
          toggleStar(p.id);
          if (currentStatus === 'star') renderSidebar(currentFilter, currentTag, currentCurriculum);
          else renderSidebar(currentFilter, currentTag, currentCurriculum);
          closeCtxMenu();
        });
        menu.querySelector('#_ctx-copy')?.addEventListener('click', () => {
          navigator.clipboard?.writeText('#' + p.id).catch(() => {});
          closeCtxMenu();
        });
        menu.querySelector('#_ctx-reset')?.addEventListener('click', () => {
          if (!confirm(`重置题目 #${p.id} 的全部进度？此操作不可撤销。`)) return;
          localStorage.removeItem('goc_' + p.id);
          localStorage.removeItem('goc_time_' + p.id);
          renderSidebar(currentFilter, currentTag, currentCurriculum);
          updateProgress();
          if (currentProblem?.id === p.id) loadProblem(p);
          closeCtxMenu();
        });
      }

      document.getElementById('problem-list')?.addEventListener('contextmenu', e => {
        const item = e.target.closest('[data-id]');
        if (!item) return;
        e.preventDefault();
        const p = problems.find(x => String(x.id) === item.dataset.id);
        if (p) openCtxMenu(e.clientX, e.clientY, p);
      });

      document.addEventListener('click', e => { if (!menu.contains(e.target)) closeCtxMenu(); });
      document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCtxMenu(); });
    })();

    // GOC-100: Arrow keys navigate problem list (when focus is NOT in editor)
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
      if (e.ctrlKey || e.metaKey || e.altKey) return;
      if (e.key !== 'ArrowUp' && e.key !== 'ArrowDown') return;
      if (!currentProblem || !problems.length) return;
      e.preventDefault();
      const idx = problems.indexOf(currentProblem);
      if (e.key === 'ArrowUp' && idx > 0) loadProblem(problems[idx - 1]);
      if (e.key === 'ArrowDown' && idx < problems.length - 1) loadProblem(problems[idx + 1]);
    });

    // GOC-055: Canvas resize handle
    const canvasResizer = document.getElementById('canvas-resizer');
    const canvasSection = document.getElementById('canvas-section');
    if (canvasResizer && canvasSection) {
      let _cDrag = false, _cStartY = 0, _cStartH = 0;
      canvasResizer.addEventListener('mousedown', e => {
        _cDrag = true; _cStartY = e.clientY; _cStartH = canvasSection.offsetHeight;
        canvasResizer.classList.add('dragging');
        document.body.style.userSelect = 'none';
        e.preventDefault();
      });
      document.addEventListener('mousemove', e => {
        if (!_cDrag) return;
        const newH = Math.max(120, Math.min(500, _cStartH - (e.clientY - _cStartY)));
        canvasSection.style.height = newH + 'px';
        // GOC-069: update canvas size label
        const canvas = document.getElementById('goc-canvas');
        const sizeLabel = document.getElementById('canvas-size-label');
        if (canvas && sizeLabel) sizeLabel.textContent = canvas.width + '×' + canvas.height;
      });
      document.addEventListener('mouseup', () => {
        if (_cDrag) { _cDrag = false; canvasResizer.classList.remove('dragging'); document.body.style.userSelect = ''; }
      });
    }

    // GOC-078: Canvas coordinate tooltip
    (function initCanvasCoord() {
      const canvas = document.getElementById('goc-canvas');
      const coord = document.getElementById('canvas-coord');
      if (!canvas || !coord) return;
      canvas.addEventListener('mousemove', e => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = Math.round((e.clientX - rect.left) * scaleX);
        const y = Math.round((e.clientY - rect.top) * scaleY);
        coord.textContent = x + ', ' + y;
        coord.style.display = 'block';
        coord.style.left = (e.clientX - rect.left + 10) + 'px';
        coord.style.top = (e.clientY - rect.top - 20) + 'px';
      });
      canvas.addEventListener('mouseleave', () => { coord.style.display = 'none'; });
    })();

    // GOC-057: Shortcut help popup
    const btnShortcut = document.getElementById('btn-shortcut');
    const shortcutPopup = document.getElementById('shortcut-popup');
    if (btnShortcut && shortcutPopup) {
      btnShortcut.addEventListener('click', e => {
        e.stopPropagation();
        const rect = btnShortcut.getBoundingClientRect();
        shortcutPopup.style.top = (rect.bottom + 6) + 'px';
        shortcutPopup.style.right = (window.innerWidth - rect.right) + 'px';
        shortcutPopup.classList.toggle('visible');
      });
      document.addEventListener('click', () => shortcutPopup.classList.remove('visible'));
    }
  }

  document.addEventListener('click', e => {
    if (!e.target.closest('#autocomplete') && !e.target.closest('#code-editor')) hideAutocomplete();
  });

  init();
})();
</script>
</body>
